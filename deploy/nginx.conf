# Uses the same Cloudflare Origin CA cert as the other Cointer sites.
# Find the path with: grep -r ssl_certificate /etc/nginx/sites-enabled/
# and update the two ssl_ lines below if yours lives somewhere else.

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cointer.app www.cointer.app;

    ssl_certificate /etc/ssl/cloudflare/cointer.app.pem;
    ssl_certificate_key /etc/ssl/cloudflare/cointer.app.key;

    if ($host = www.cointer.app) {
        return 301 https://cointer.app$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name docs.cointer.app;

    ssl_certificate /etc/ssl/cloudflare/cointer.app.pem;
    ssl_certificate_key /etc/ssl/cloudflare/cointer.app.key;

    return 301 https://cointer.app/docs;
}
